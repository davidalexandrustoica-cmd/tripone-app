<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<meta http-equiv="refresh" content="2; url=finder.html">
<title>TripOne — Trip Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:grid;place-items:center;background:#f6f9fd;color:#10233f;font-family:Arial,sans-serif;padding:24px}
.box{max-width:460px;text-align:center;border:1px solid #dbe6f2;background:#ffffff;border-radius:8px;padding:28px}
h1{font-size:24px;margin-bottom:10px}
p{color:#53657d;line-height:1.6;margin-bottom:18px}
a{display:inline-block;background:#2f6f9f;color:#ffffff;text-decoration:none;border-radius:999px;padding:10px 18px;font-weight:600}


/* LIGHT LAUNCH THEME */
:root{
  --bg:#f6f9fd;--bg2:#eef4fb;--bg3:#eef4fb;--card:#ffffff;--card2:#f8fbff;
  --border:#dbe6f2;--border2:#c7d7e8;--ink:#10233f;--ink2:#53657d;--ink3:#7c8ba0;
  --cyan:#2f6f9f;--cyan2:#2f6f9f;--violet:#456f9d;--violet2:#6f8fb4;
  --amber:#b7791f;--coral:#d64b4b;--green:#2f855a;
}
body{background:var(--bg)!important;color:var(--ink)!important}
body::before{display:none!important}
nav{background:rgba(255,255,255,.92)!important;border-bottom:1px solid var(--border)!important;box-shadow:0 8px 24px rgba(16,35,63,.06)!important}
.logo,.footer-logo{color:var(--ink)!important}
.logo em,.footer-logo em,.hero h1 em,h1 .grad,.page-hero h1 em{color:var(--cyan)!important;background:none!important;-webkit-text-fill-color:currentColor!important}
.nav-links a{color:var(--ink2)!important}.nav-links a:hover,.nav-links a.active{color:var(--ink)!important}
.nav-cta,.submit-btn,.search-go,.compare-cta,.dest-hd-btn,.dc-btn,.rec-btn-primary,.nf-btn.primary,.cta-btn.primary,.empty-state a{background:var(--cyan)!important;color:#fff!important;background-image:none!important;box-shadow:none!important}
.hero-badge,.top-pick-badge,.dest-price,.best-badge{background:#eaf2fa!important;border:1px solid var(--border2)!important;color:var(--cyan)!important}
.search-box,.form-card,.feat,.cat-card,.dest-card,.pillar,.step,.prob-card,.faq-item,.cta-card,.dc-card,.dest-card,.picker,.nights-box,.dest-hd,.verdict-card,.verdict-item,.modal,.scard,.sec,.desc-card,.weather-now,.hcard,.ac,.rc,.nc,.warnbox,.disc,.trans,.bcard,.day-budget,.rec-card,.rec-hl,.followup-wrap{background:var(--card)!important;border-color:var(--border)!important;box-shadow:0 10px 28px rgba(16,35,63,.05)!important}
.form-select,.form-input,.modal-search-wrap,.modal-search-wrap input,.search-box input{background:#fff!important;color:var(--ink)!important;border-color:var(--border)!important}
.form-select:focus,.form-input:focus,.search-box:focus-within{border-color:var(--cyan)!important}
.chip-opt,.qchip,.bud-btn,.cat-btn,.add-compare,.rec-btn-secondary,.retry-btn,.sbtn,.picker-add,.modal-dest{background:#fff!important;border-color:var(--border)!important;color:var(--ink2)!important}
.chip-opt.sel,.cat-btn.active,.bud-btn.active,.add-compare.added{background:#eaf2fa!important;border-color:var(--cyan)!important;color:var(--cyan)!important}
.rec-card.top-pick,.dest-hd.winner{border-color:var(--cyan)!important;background:#ffffff!important}
.rec-card.top-pick::before{background:var(--cyan)!important}
.rec-why{background:#f8fbff!important;border-left-color:var(--cyan)!important}
.bar-fill{background:var(--cyan)!important}
.mobile-menu{background:rgba(255,255,255,.98)!important;border-bottom:1px solid var(--border)!important}
.wtemp,.bcard.ideal .bcard-amount,.btotal{color:var(--cyan)!important;background:none!important;-webkit-text-fill-color:currentColor!important}
.sky-link{background:#eaf2fa!important;border-color:var(--border2)!important;color:var(--ink)!important}
a{color:var(--cyan)}

</style>
</head>
<body>
<main class="box">
  <h1>Itinerary is paused for launch</h1>
  <p>TripOne is focusing first on the free destination finder and comparison tools. Redirecting you to Finder.</p>
  <a href="finder.html">Open Trip Finder</a>
</main>
</body>
</html>
