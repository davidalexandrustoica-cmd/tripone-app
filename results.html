<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--card:#1c1c21;--border:#2a2a32;--border2:#333340;
  --ink:#f4f3f0;--ink2:#9998a8;--ink3:#5a5a6e;
  --cyan:#00e5ff;--cyan2:#00b8d4;--violet2:#a78bfa;
  --amber:#f59e0b;--coral:#ff6b6b;--green:#10b981;--r:12px;
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:14px 24px;background:rgba(9,9,11,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:"Syne",sans-serif;font-weight:800;font-size:18px;text-decoration:none;color:var(--ink)}
.logo em{font-style:normal;background:linear-gradient(135deg,var(--cyan),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:20px;margin-left:auto}
.nav-links a{font-size:14px;color:var(--ink2);text-decoration:none}
.nav-links a:hover{color:var(--ink)}
.nav-cta{background:linear-gradient(135deg,#7c3aed,var(--cyan2));color:#fff;border:none;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;white-space:nowrap;font-family:"DM Sans",sans-serif}
.hero{padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.hero h1{font-family:"Syne",sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px;margin-bottom:6px}
.hero p{font-size:13px;color:var(--ink2);margin-bottom:12px}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:4px 14px;font-size:12px;color:var(--ink2)}
.tag.good{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:var(--green)}
.layout{display:grid;grid-template-columns:1fr 260px;max-width:1200px;margin:0 auto}
.main{padding:20px 24px;border-right:1px solid var(--border)}
.side{padding:18px 16px}
.sec{margin-bottom:24px}
.sechd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sechd i{font-size:17px}
.sechd h2{font-family:"Syne",sans-serif;font-weight:700;font-size:14px}
.live-badge{font-size:10px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:var(--green);border-radius:100px;padding:2px 8px;margin-left:4px}
.desc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:13px;color:var(--ink2);line-height:1.8}
.weather-now{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:10px}
.wtemp{font-family:"Syne",sans-serif;font-size:52px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--cyan),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.winfo{flex:1}
.wdesc{font-size:15px;font-weight:500;text-transform:capitalize;margin-bottom:6px}
.wdetails{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink2)}
.wrow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wd{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 3px;text-align:center}
.wd.today{border-color:var(--cyan2);background:rgba(0,229,255,.05)}
.wdn{font-size:10px;color:var(--ink3);margin-bottom:4px}
.wdi{font-size:18px;color:var(--cyan);line-height:1.4}
.wdt{font-size:13px;font-weight:500}
.wdl{font-size:10px;color:var(--ink3)}
.wloading{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;text-align:center;font-size:14px;color:var(--ink2)}

.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.hn{font-size:13px;font-weight:500;margin-bottom:2px}
.ht{font-size:11px;color:var(--ink3);margin-bottom:8px}
.hrow{display:flex;justify-content:space-between;align-items:center}
.hst{color:var(--amber);font-size:11px}
.hp{font-size:13px;font-weight:500}
.budget-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.bcard.ideal{border-color:rgba(0,229,255,.2);background:rgba(0,229,255,.03)}
.bcard-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.bcard-amount{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;margin-bottom:3px}
.bcard.ideal .bcard-amount{background:linear-gradient(135deg,var(--cyan),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bcard-desc{font-size:11px;color:var(--ink3);line-height:1.4}
.bdown{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.brow{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)}
.brow:last-child{border:none}
.brow span:first-child{color:var(--ink3)}
.alist{display:flex;flex-direction:column;gap:6px}
.ac{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.aic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:#18181c}
.an{font-size:13px;font-weight:500}
.ad{font-size:11px;color:var(--ink3)}
.ap{font-size:12px;font-weight:500;margin-left:auto;white-space:nowrap}
.ap.free{color:var(--green)}
.ap.paid{color:var(--amber)}
.rlist{display:flex;flex-direction:column}
.rc{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.rc:last-child{border:none}
.rnum{font-family:"Syne",sans-serif;font-size:14px;font-weight:700;color:var(--cyan);width:18px;flex-shrink:0}
.rl{font-size:13px;font-weight:500}
.rd{font-size:11px;color:var(--ink3)}
.rp{font-size:11px;color:var(--ink3);margin-left:auto;white-space:nowrap}
.nlist,.warnlist,.disc-list,.tlist{display:flex;flex-direction:column;gap:6px}
.nc{display:flex;align-items:flex-start;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px}
.ncicon{width:32px;height:32px;border-radius:8px;background:rgba(124,58,237,.1);display:flex;align-items:center;justify-content:center;color:var(--violet2);font-size:15px;flex-shrink:0}
.ncn{font-size:13px;font-weight:500}
.ncd{font-size:11px;color:var(--ink3);margin-top:2px}
.warn-item{display:flex;align-items:flex-start;gap:9px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:var(--r);padding:11px 13px}
.warn-item i{color:var(--amber);font-size:15px;flex-shrink:0;margin-top:1px}
.warn-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.warn-text{font-size:12px;color:var(--ink2);line-height:1.5}
.disc{display:flex;align-items:flex-start;gap:9px;background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.15);border-radius:var(--r);padding:11px 13px}
.disc i{color:var(--green);font-size:15px;flex-shrink:0;margin-top:1px}
.disc-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.disc-text{font-size:12px;color:var(--ink2);line-height:1.5}
.trans{display:flex;align-items:flex-start;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.trans-icon{font-size:19px;flex-shrink:0;width:26px;text-align:center;margin-top:1px}
.trans-name{font-size:13px;font-weight:500}
.trans-desc{font-size:11px;color:var(--ink3);margin-top:2px}
.trans-price{font-size:12px;color:var(--cyan);font-weight:500;margin-left:auto;white-space:nowrap;flex-shrink:0}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.stitle{font-family:"Syne",sans-serif;font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.stitle i{color:var(--cyan)}
.sb-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)}
.sb-row:last-child{border:none}
.sb-row span:first-child{color:var(--ink3)}
.btotal{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-top:6px}
.warnbox{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:9px;padding:9px 11px;font-size:12px;color:var(--amber);display:flex;gap:7px;margin-bottom:10px;line-height:1.5}
.warnbox i{font-size:14px;flex-shrink:0;margin-top:1px}
.aibtn{width:100%;background:linear-gradient(135deg,#7c3aed,var(--cyan2));color:#fff;border:none;border-radius:9px;padding:11px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:7px}
.sbtn{width:100%;background:#18181c;border:1px solid var(--border);border-radius:9px;padding:8px;font-family:"DM Sans",sans-serif;font-size:12px;cursor:pointer;color:var(--ink2);margin-bottom:6px;text-align:left;padding-left:12px}
.sbtn:hover{color:var(--ink)}
.not-found{text-align:center;padding:60px 20px;color:var(--ink2)}
.not-found h2{font-family:"Syne",sans-serif;font-size:20px;color:var(--ink);margin-bottom:10px}
.not-found p{margin-bottom:24px}
.nf-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.nf-btn{padding:11px 22px;border-radius:10px;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;text-decoration:none;display:inline-block}
.nf-btn.primary{background:var(--cyan2);color:#000}
.nf-btn.secondary{background:#7c3aed;color:#fff}
@media(max-width:700px){
  .layout{grid-template-columns:1fr}
  .hgrid,.budget-split{grid-template-columns:1fr}
  .wrow{grid-template-columns:repeat(4,1fr)}
  nav{padding:12px 16px}
  .nav-links{display:none}
}

.flights-note{font-size:12px;color:var(--ink3);margin-top:10px;font-style:italic}
.days-row{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.days-label{font-size:13px;color:var(--ink2)}
.days-label strong{color:var(--amber);font-size:15px}
.days-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer}
.days-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--bg)}
.days-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--amber);cursor:pointer;border:2px solid var(--bg)}

.sky-link{display:flex;align-items:center;justify-content:space-between;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);border-radius:10px;padding:14px 18px;text-decoration:none;color:var(--ink);font-size:14px;font-weight:500;transition:background .2s}
.sky-link:hover{background:rgba(0,229,255,.12)}
.sky-arrow{font-size:13px;color:var(--cyan)}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Trip<em>One</em></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="categories.html">Destinations</a>
    <a href="finder.html">Finder</a>
    <a href="compare.html">Compare</a>
    <a href="itinerary.html">Itinerary</a>
    <a href="about.html">About</a>
  </div>
  <a href="categories.html" class="nav-cta">Explore destinations →</a>
</nav>

<div id="hero" class="hero">
  <h1 id="dest-title">Loading...</h1>
  <p id="dest-sub">Everything you need for the perfect trip</p>
  <div class="tags" id="dest-tags"></div>
</div>

<div class="layout">
  <div class="main" id="main-col">
    <div class="wloading"><i class="ti ti-loader ti-spin"></i> Loading destination data...</div>
  </div>
  <div class="side" id="side-col"></div>
</div>

<script src="data.js?v=3"></script>
<script>
var params = new URLSearchParams(window.location.search);
var DEST = params.get("dest") || "Santorini";
document.title = "TripOne — " + DEST;

function wIcon(icon, size) {
  var s = size || 18;
  if (icon.indexOf("01") !== -1) return '<i class="ti ti-sun" style="font-size:' + s + 'px"></i>';
  if (icon.indexOf("02") !== -1 || icon.indexOf("03") !== -1) return '<i class="ti ti-cloud-sun" style="font-size:' + s + 'px"></i>';
  if (icon.indexOf("04") !== -1) return '<i class="ti ti-cloud" style="font-size:' + s + 'px"></i>';
  if (icon.indexOf("09") !== -1 || icon.indexOf("10") !== -1) return '<i class="ti ti-cloud-rain" style="font-size:' + s + 'px"></i>';
  if (icon.indexOf("11") !== -1) return '<i class="ti ti-cloud-storm" style="font-size:' + s + 'px"></i>';
  if (icon.indexOf("13") !== -1) return '<i class="ti ti-snow" style="font-size:' + s + 'px"></i>';
  return '<i class="ti ti-cloud" style="font-size:' + s + 'px"></i>';
}

function escapeHTML(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch];
  });
}

async function loadWeather(city) {
  try {
    var r = await fetch("/api/weather?city=" + encodeURIComponent(city));
    if (!r.ok) throw new Error("Weather unavailable");
    var weather = await r.json();
    var cur = weather.current;
    var fore = weather.forecast;
    var days = {};
    var dn = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    fore.list.forEach(function(item) {
      var d = item.dt_txt.split(" ")[0];
      if (!days[d]) days[d] = {temps:[], icons:[]};
      days[d].temps.push(item.main.temp);
      days[d].icons.push(item.weather[0].icon);
    });
    var proc = Object.entries(days).slice(0,7).map(function(entry, i) {
      var d = new Date(entry[0]);
      var v = entry[1];
      return {
        name: i === 0 ? "Today" : dn[d.getDay()],
        max: Math.round(Math.max.apply(null, v.temps)),
        min: Math.round(Math.min.apply(null, v.temps)),
        icon: v.icons[Math.floor(v.icons.length / 2)]
      };
    });
    var t = Math.round(cur.main.temp);
    var fl = Math.round(cur.main.feels_like);
    var hum = cur.main.humidity;
    var wind = Math.round(cur.wind.speed * 3.6);
    var desc = cur.weather[0].description;
    var icon = cur.weather[0].icon;
    var dayCards = proc.map(function(d, i) {
      return '<div class="wd ' + (i === 0 ? "today" : "") + '">' +
        '<div class="wdn">' + d.name + '</div>' +
        '<div class="wdi">' + wIcon(d.icon, 18) + '</div>' +
        '<div class="wdt">' + d.max + '°</div>' +
        '<div class="wdl">' + d.min + '°</div>' +
        '</div>';
    }).join("");
    return '<div class="weather-now">' +
      '<div class="wtemp">' + t + '°</div>' +
      '<div class="winfo">' +
        '<div class="wdesc">' + desc + '</div>' +
        '<div class="wdetails">' +
          '<span>Feels like ' + fl + '°C</span>' +
          '<span>Humidity ' + hum + '%</span>' +
          '<span>Wind ' + wind + ' km/h</span>' +
        '</div>' +
      '</div>' +
      '<div style="font-size:46px;color:var(--cyan)">' + wIcon(icon, 46) + '</div>' +
      '</div>' +
      '<div class="wrow">' + dayCards + '</div>';
  } catch(e) {
    return '<div class="wloading" style="color:var(--coral)">Weather unavailable for this destination.</div>';
  }
}

function renderPage() {
  var data = getDestination(DEST);

  if (!data) {
    document.getElementById("dest-title").textContent = DEST;
    document.getElementById("dest-sub").textContent = "Destination not in our database yet";
    var safeDest = escapeHTML(DEST);
    document.getElementById("main-col").innerHTML =
      '<div class="not-found">' +
        '<h2>"' + safeDest + '" is not in our database yet</h2>' +
        '<p>We currently cover 20 top destinations. Try one of those or use the AI Finder.</p>' +
        '<div class="nf-btns">' +
          '<a href="index.html" class="nf-btn primary">← Back to search</a>' +
          '<a href="finder.html" class="nf-btn secondary">✨ AI Finder</a>' +
        '</div>' +
      '</div>';
    document.getElementById("side-col").innerHTML = "";
    return;
  }

  // Hero
  document.getElementById("dest-title").textContent = data.name + ", " + data.country + " " + data.emoji;
  document.getElementById("dest-sub").textContent = "Everything you need for the perfect trip — updated today";
  var tagsHTML = "";
  for (var i = 0; i < data.tags.length; i++) {
    tagsHTML += '<div class="tag ' + (i === 0 ? "good" : "") + '">' + data.tags[i] + '</div>';
  }
  document.getElementById("dest-tags").innerHTML = tagsHTML;

  // Sidebar
  var bdRows = "";
  for (var i = 0; i < data.budget.breakdown.length; i++) {
    var r = data.budget.breakdown[i];
    bdRows += '<div class="sb-row"><span>' + r[0] + '</span><span>' + r[1] + '</span></div>';
  }
  document.getElementById("side-col").innerHTML =
    '<div class="scard" id="sidebar-budget">' +
      '<div class="stitle"><i class="ti ti-calculator"></i> Budget — <span id="sb-days">7</span> nights</div>' +
      '<div id="sb-rows"></div>' +
      '<span class="btotal" id="sb-total"></span>' +
    '</div>' +
    '<div class="warnbox"><i class="ti ti-info-circle"></i>Book flights 6+ weeks ahead for best prices.</div>' +
    '<button class="aibtn" onclick="window.location.href=\'compare.html?dests=\' + encodeURIComponent(DEST.toLowerCase())">' +
      '<i class="ti ti-arrows-diff"></i> Compare with another city' +
    '</button>' +
    '<button class="sbtn" onclick="window.location.href=\'categories.html\'">Browse all destinations</button>' +
    '<button class="sbtn" onclick="window.location.href=\'index.html\'">← Back to search</button>' +
    '<div class="scard" style="margin-top:10px">' +
      '<div class="stitle"><i class="ti ti-info-circle"></i> Quick Facts</div>' +
      '<div class="sb-row"><span>Best months</span><span>' + data.best_months + '</span></div>' +
      '<div class="sb-row"><span>Peak season</span><span>' + data.peak + '</span></div>' +
      '<div class="sb-row"><span>Language</span><span>' + data.language + '</span></div>' +
      '<div class="sb-row"><span>Currency</span><span>' + data.currency + '</span></div>' +
      '<div class="sb-row"><span>Timezone</span><span>' + data.timezone + '</span></div>' +
    '</div>';

  // Main content
  var flightsHTML = "";
  for (var i = 0; i < data.flights.length; i++) {
    var f = data.flights[i];
    var badge = f.best ? '<div class="flbadge">Cheapest</div>' : "";
    var cls = f.best ? "fl best" : "fl";
    flightsHTML +=
      '<div class="' + cls + '">' +
        '<div style="display:flex;align-items:center;gap:10px">' +
          '<div><div class="flair">' + f.airline + '</div>' + badge + '</div>' +
          '<div><div class="flrt">' + f.route + '</div><div class="fldt">' + f.detail + '</div></div>' +
        '</div>' +
        '<div class="flp">' +
          '<strong>' + f.price + '</strong>' +
          '<span>round trip</span>' +

// ── BUDGET / DAYS LOGIC ──────────────────────────────────────────────────────

function parseBudgetNum(str) {
  var clean = str.replace(/[€,+]/g, "").trim();
  return parseInt(clean) || 0;
}

function formatBudget(num) {
  if (num >= 1000) return "€" + num.toLocaleString("en");
  return "€" + num;
}

// Scale a price range string (e.g. "€28–€85") by number of nights
function scaleRange(val, days) {
  var parts = val.split("–");
  var scaled = parts.map(function(p) {
    var num = parsePrice(p.trim());
    if (!num) return p;
    return "€" + Math.round(num * days);
  });
  return scaled.join("–");
}

function updateBudget() {
  var slider = document.getElementById("days-slider");
  if (!slider) return;
  var days = parseInt(slider.value);

  var dv = document.getElementById("days-val");
  if (dv) dv.textContent = days;
  var sbDays = document.getElementById("sb-days");
  if (sbDays) sbDays.textContent = days;

  var data = window._currentData;
  if (!data || !data.budget) return;

  // Scale min/ideal totals by days (base values are already per-night excl. flights)
  var minBase = parseBudgetNum(data.budget.min);
  var idealBase = parseBudgetNum(data.budget.ideal);
  var minScaled = Math.round(minBase * days / 7);
  var idealScaled = Math.round(idealBase * days / 7);

  // Budget cards
  var cards = document.getElementById("budget-cards");
  if (cards) {
    cards.innerHTML =
      '<div class="bcard">' +
        '<div class="bcard-label">Minimum budget</div>' +
        '<div class="bcard-amount">' + formatBudget(minScaled) + '</div>' +
        '<div class="bcard-desc">' + data.budget.min_desc + '</div>' +
      '</div>' +
      '<div class="bcard ideal">' +
        '<div class="bcard-label">Ideal budget</div>' +
        '<div class="bcard-amount">' + formatBudget(idealScaled) + '</div>' +
        '<div class="bcard-desc">' + data.budget.ideal_desc + '</div>' +
      '</div>';
  }

  // Breakdown rows — all items scale per night since flights removed
  var breakdown = document.getElementById("budget-breakdown");
  if (breakdown && data.budget.breakdown) {
    var rows = "";
    for (var i = 0; i < data.budget.breakdown.length; i++) {
      var r = data.budget.breakdown[i];
      var label = r[0];
      var val = r[1];
      var isAccom = label.toLowerCase().indexOf("accommodation") !== -1 || label.toLowerCase().indexOf("cazare") !== -1;
      // Accommodation scales per night directly; food/activities/transport scale per day
      var scaled = scaleRange(val, isAccom ? days : days);
      rows += '<div class="brow"><span>' + label + '</span><span>' + scaled + '</span></div>';
    }
    // Add flights note row
    rows += '<div class="brow" style="border-top:1px dashed var(--border2);margin-top:4px;padding-top:8px">' +
      '<span style="color:var(--ink2)">✈️ Flights</span>' +
      '<span><a href="https://www.skyscanner.net" target="_blank" style="color:var(--cyan);font-size:11px;text-decoration:none">Skyscanner →</a></span>' +
    '</div>';
    breakdown.innerHTML = rows;
  }

  // Sidebar total
  var sbTotal = document.getElementById("sb-total");
  if (sbTotal) sbTotal.textContent = formatBudget(minScaled) + " – " + formatBudget(idealScaled);

  // Sidebar rows
  var sbRows = document.getElementById("sb-rows");
  if (sbRows && data.budget.breakdown) {
    var srows = "";
    for (var i = 0; i < data.budget.breakdown.length; i++) {
      var r = data.budget.breakdown[i];
      var label = r[0];
      var val = r[1];
      var scaled = scaleRange(val, days);
      srows += '<div class="sb-row"><span>' + label + '</span><span>' + scaled + '</span></div>';
    }
    srows += '<div class="sb-row"><span style="color:var(--ink2)">✈️ Flights</span><span><a href="https://www.skyscanner.net" target="_blank" style="color:var(--cyan);font-size:11px;text-decoration:none">Skyscanner →</a></span></div>';
    sbRows.innerHTML = srows;
  }
}
